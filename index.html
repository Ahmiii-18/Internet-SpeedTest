<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Speed Test Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Internet Speed Test</h1>
  <p id="statusText">Ready</p>

  <div class="circle">
    <!-- Subtle dark-blue animated ring -->
    <div class="ring"></div>

    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="85" class="bg"></circle>
      <circle cx="100" cy="100" r="85" class="progress" id="progressCircle"></circle>
    </svg>

    <div class="speed-text">
      <span id="speed">0</span>
      <small>Mbps</small>
    </div>
  </div>

  <div class="details">
    <p>Ping: <span id="ping">--</span> ms</p>
    <p>Download: <span id="download">--</span> Mbps</p>
    <p>Upload: <span id="upload">--</span> Mbps</p>
  </div>

  <div class="network-info">
    <p>IP: <span id="ip">--</span></p>
    <p>City: <span id="city">--</span></p>
    <p>Country: <span id="country">--</span></p>
    <p>ISP: <span id="isp">--</span></p>
  </div>

  <div class="buttons">
    <button id="startBtn">Start Test</button>
    <button id="themeBtn">Toggle Theme</button>
  </div>

  <h3>Last 5 Results</h3>
  <canvas id="historyChart"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
